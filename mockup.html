<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make 10 - UI Mockup (C Refined)</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { -webkit-user-select: none; user-select: none; touch-action: manipulation; }
  html, body { margin: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; }
</style>
</head>
<body>

<div style="display: flex; gap: 24px; padding: 24px; background: #1e1e2e; min-height: 100vh; justify-content: center; align-items: flex-start; flex-wrap: wrap;">

  <!-- ===== C: ボタン大きめ版 ===== -->
  <div style="width: 375px; flex-shrink: 0;">
    <h2 class="text-white text-center text-sm mb-2 opacity-60">C: グラス + ビビッド（ボタン拡大）</h2>
    <div class="flex flex-col rounded-3xl overflow-hidden relative" style="height: 740px; background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 40%, #0c4a6e 100%);">
      <!-- 背景の装飾ブロブ -->
      <div class="absolute top-10 -left-10 w-40 h-40 bg-fuchsia-500/30 rounded-full blur-3xl"></div>
      <div class="absolute bottom-20 -right-10 w-48 h-48 bg-cyan-500/20 rounded-full blur-3xl"></div>

      <header class="relative flex w-full items-center justify-between px-5 py-4">
        <h1 class="text-2xl font-bold text-white">Make 10</h1>
        <div class="rounded-full bg-white/15 backdrop-blur-md border border-white/20 px-4 py-1.5 text-sm font-bold text-white">🔥 3</div>
      </header>
      <div class="relative flex flex-1 flex-col justify-between pb-6">
        <div class="flex w-full items-center justify-center px-5 py-4">
          <div class="w-full rounded-2xl border border-white/20 bg-white/10 backdrop-blur-md px-5 py-6 text-right text-4xl font-mono font-semibold text-white min-h-[4rem]">
            3 + 5 × <span class="text-white/30">?</span>
          </div>
        </div>
        <div class="flex flex-col gap-3">
          <!-- 数字パッド -->
          <div class="grid grid-cols-4 gap-2.5 px-5">
            <button class="flex h-[4.5rem] items-center justify-center rounded-2xl bg-white/15 backdrop-blur-sm border border-white/20 text-2xl font-bold text-white shadow-lg transition-transform active:scale-95">3</button>
            <button class="flex h-[4.5rem] items-center justify-center rounded-2xl bg-white/15 backdrop-blur-sm border border-white/20 text-2xl font-bold text-white shadow-lg transition-transform active:scale-95">5</button>
            <button class="flex h-[4.5rem] items-center justify-center rounded-2xl bg-white/5 border border-white/10 text-2xl font-bold text-white/25" disabled>2</button>
            <button class="flex h-[4.5rem] items-center justify-center rounded-2xl bg-white/15 backdrop-blur-sm border border-white/20 text-2xl font-bold text-white shadow-lg transition-transform active:scale-95">8</button>
          </div>
          <!-- 演算子パッド -->
          <div class="grid grid-cols-6 gap-2 px-5">
            <button class="flex h-[3.5rem] items-center justify-center rounded-2xl bg-fuchsia-500/30 backdrop-blur-sm border border-fuchsia-400/30 text-xl font-bold text-fuchsia-200 transition-transform active:scale-95">+</button>
            <button class="flex h-[3.5rem] items-center justify-center rounded-2xl bg-fuchsia-500/30 backdrop-blur-sm border border-fuchsia-400/30 text-xl font-bold text-fuchsia-200 transition-transform active:scale-95">−</button>
            <button class="flex h-[3.5rem] items-center justify-center rounded-2xl bg-fuchsia-500/30 backdrop-blur-sm border border-fuchsia-400/30 text-xl font-bold text-fuchsia-200 transition-transform active:scale-95">×</button>
            <button class="flex h-[3.5rem] items-center justify-center rounded-2xl bg-fuchsia-500/30 backdrop-blur-sm border border-fuchsia-400/30 text-xl font-bold text-fuchsia-200 transition-transform active:scale-95">÷</button>
            <button class="flex h-[3.5rem] items-center justify-center rounded-2xl bg-white/10 backdrop-blur-sm border border-white/15 text-xl font-bold text-white/60 transition-transform active:scale-95">(</button>
            <button class="flex h-[3.5rem] items-center justify-center rounded-2xl bg-white/10 backdrop-blur-sm border border-white/15 text-xl font-bold text-white/60 transition-transform active:scale-95">)</button>
          </div>
          <!-- コントロールパッド -->
          <div class="grid grid-cols-3 gap-2.5 px-5">
            <button class="flex h-[4.5rem] items-center justify-center rounded-2xl bg-white/10 backdrop-blur-sm border border-white/15 text-xl font-bold text-white/70 transition-transform active:scale-95">⌫</button>
            <button class="flex h-[4.5rem] items-center justify-center rounded-2xl bg-rose-500/40 backdrop-blur-sm border border-rose-400/30 text-lg font-bold text-rose-200 transition-transform active:scale-95">C</button>
            <button class="flex h-[4.5rem] items-center justify-center rounded-2xl bg-cyan-400 text-xl font-extrabold text-cyan-950 shadow-lg shadow-cyan-400/40 transition-transform active:scale-95">=</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
