<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <title>Make 10</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background (no rounded corners - OS will mask) -->
  <rect width="192" height="192" fill="url(#bg)"/>
  <!-- "10" text within safe zone (central 80% = ~154px circle) -->
  <text x="96" y="110" text-anchor="middle"
        font-family="Nunito, system-ui, sans-serif"
        font-weight="800" font-size="80" fill="#ffffff">10</text>
</svg>
